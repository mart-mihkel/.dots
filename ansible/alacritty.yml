- hosts: localhost
  become: true
  tasks:

  - name: include vars
    include_vars:
      file: vars.yml

  - name: install dependencies
    apt:
      pkg:
      - alacritty

  - stat: "path={{ home }}/dotfiles"
    register: dotfiles

  - name: clone dotfiles
    when: not dotfiles.stat.exists
    git:
      accept_newhostkey: true
      repo: git@github.com:mart-mihkel/dotfiles.git
      dest: "{{ home }}/dotfiles"

  - name: symlink config
    file:
      path: "{{ home }}/.config/alacritty"
      src: "{{ home }}/dotfiles/alacritty"
      state: link
      force: yes
