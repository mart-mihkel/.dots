- hosts: localhost
  become: true
  tasks:

  - name: include vars
    include_vars:
      file: vars.yml

  - name: install packages
    pacman:
      name:
      - noto-fonts-emoji
      - noto-fonts-cjk
      - fontconfig
      - alacritty
      - firefox
      - ripgrep
      - neovim
      - cmake
      - make
      - gcc

  - stat: "path={{ home }}/.rustup"
    register: rustup

  - name: install rust
    when: not rustup.stat.exists
    become_user: "{{ user }}"
    shell: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y

  - stat: "path={{ home }}/.nvm"
    register: nvm

  - name: install node version manager
    when: not nvm.stat.exists
    become_user: "{{ user }}"
    shell: curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.0/install.sh | bash

  - name: install node
    shell: "source {{ home }}/.nvm/nvm.sh && nvm install 22"

  - stat: "path={{ home }}/.ghcup"
    register: ghcup

  - name: install haskell
    when: not ghcup.stat.exists
    become_user: "{{ user }}"
    shell: curl --proto '=https' --tlsv1.2 -sSf https://get-ghcup.haskell.org | sh
    environment:
      BOOTSTRAP_HASKELL_NONINTERACTIVE: true
      BOOTSTRAP_HASKELL_ADJUST_BASHRC: true

  - name: install ubuntu mono nerd font
    become_user: "{{ user }}"
    shell: "{{ item }}"
    loop:
      - "mkdir -p {{ home }}/.local/share/fonts"
      - "cp {{ home }}/dotfiles/fonts/UbuntuMonoNerdFont-Regular.ttf {{ home }}/.local/share/fonts/UbuntuMonoNerdFont-Regular.ttf"
      - "fc-cache -f -v"

  - name: symlink configs
    file:
      path: "{{ item.path }}"
      src: "{{ item.src }}"
      state: link
      force: yes
    loop:
      - { path: "{{ config }}/nvim", src: "{{ home }}/dotfiles/nvim" }
      - { path: "{{ config }}/alacritty", src: "{{ home }}/dotfiles/alacritty" }
