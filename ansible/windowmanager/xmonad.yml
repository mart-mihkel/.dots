- hosts: localhost
  become: true
  tasks:

  - name: include vars
    include_vars:
      file: ../vars.yml

  - stat: "path={{ home }}/.ghcup"
    register: ghcup

  - name: install haskell
    when: not ghcup.stat.exists
    become_user: "{{ user }}"
    shell: curl --proto '=https' --tlsv1.2 -sSf https://get-ghcup.haskell.org | sh
    environment:
      BOOTSTRAP_HASKELL_NONINTERACTIVE: true

  - name: install dependencies
    apt:
      pkg:
      - libxinerama-dev
      - libxrandr-dev
      - libxss-dev
      - libx11-dev
      - libxft-dev
      - xmobar
      - dmenu
      - feh

  - stat: "path={{ home }}/dotfiles"
    register: dotfiles

  - name: clone dotfiles
    when: not dotfiles.stat.exists
    git:
      accept_newhostkey: true
      repo: git@github.com:mart-mihkel/dotfiles.git
      dest: "{{ home }}/dotfiles"

  - name: build xmonad
    become_user: "{{ user }}"
    shell:
      chdir: "{{ home }}/dotfiles/xmonad"
      cmd: "{{ item }}"
    loop:
    - "{{ home }}/.ghcup/bin/stack upgrade"
    - "{{ home }}/.ghcup/bin/stack install"

  - name: symlink config
    file:
      path: "{{ home }}/.config/xmonad"
      src: "{{ home }}/dotfiles/xmonad"
      state: link
      force: yes
