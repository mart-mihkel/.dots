- hosts: localhost
  become: true
  tasks:

  - name: include vars
    include_vars:
      file: vars.yml

  - name: install dependencies
    apt:
      pkg:
      - libxinerama-dev
      - libxrandr-dev
      - haskell-stack
      - libxss-dev
      - libx11-dev
      - libxft-dev
      - xmobar
      - dmenu

  - name: haskell setup
    become_user: "{{ user }}"
    shell:
      cmd: "{{ item }}"
      chdir: "{{ home }}/dotfiles/xmonad"
    loop:
    - { "stack upgrade" }
    - { "stack setup" }
    - { "stack install" }

  - stat: "path={{ home }}/dotfiles"
    register: dotfiles

  - name: clone dotfiles
    when: not dotfiles.stat.exists
    git:
      accept_newhostkey: true
      repo: git@github.com:mart-mihkel/dotfiles.git
      dest: "{{ home }}/dotfiles"

  - name: symlink config
    file:
      path: "{{ home }}/.config/xmonad"
      src: "{{ home }}/dotfiles/xmonad"
      state: link
      force: yes
