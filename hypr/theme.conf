$black   = rgb(010101)
$red     = rgb(e7666a)
$green   = rgb(80ab24)
$yellow  = rgb(eba54d)
$blue    = rgb(4196df)
$magenta = rgb(9870c3)
$cyan    = rgb(51b891)
$white   = rgb(c1c1c1)

general {
    gaps_in = 8
    gaps_out = 0
    border_size = 2
    resize_on_border = true
    allow_tearing = false
    layout = dwindle

    col.active_border = $black
    col.inactive_border = rgba(00000000)
}

decoration {
    rounding = 0
    active_opacity = 1.0
    inactive_opacity = 1.0
    drop_shadow = true
    shadow_range = 4
    shadow_render_power = 3

    col.shadow = rgba(1a1a1aee)

    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = false
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = false
}
