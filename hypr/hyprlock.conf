$black   = rgb(010101)
$red     = rgb(e7666a)
$green   = rgb(80ab24)
$yellow  = rgb(eba54d)
$blue    = rgb(4196df)
$magenta = rgb(9870c3)
$cyan    = rgb(51b891)
$white   = rgb(c1c1c1)

general {
    ignore_empty_input = true
}

background {
    path = ~/.cache/current-wallpaper
    blur_passes = 2
    blur_size = 5
    vibrancy = 0.1696
}

input-field {
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.28
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = -1
    outer_color = $black
    inner_color = $white
    font_color = $black
    fade_on_empty = true
    fade_timeout = 1500
    font_family = UbuntuMono Nerd Font
    placeholder_text = <i>Enter Password...</i>
    hide_input = false
    rounding = 20
    check_color = $black
    fail_color = $red
    fail_timeout = 2000
    fail_transition = 200
}
