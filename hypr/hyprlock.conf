# vim: ft=cfg

$wp = ~/git/dotfiles/walls/sea.jpg

general {
    ignore_empty_input = true
    immediate_render = true
    no_fade_out = true
    no_fade_in = true
}

background {
    path = $wp
    blur_passes = 2
    blur_size = 4
}

input-field {
    rounding = 0
    outline_thickness = 1
    inner_color = rgb(fbfbfb)
    placeholder_text =
    fail_text =
    fail_color = rgb(c55555)
    fail_timeout = 200
}
